services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: post_writer_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d post_writer_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    restart: always
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    environment:
      APP_ENV: ${APP_ENV:-local}
      BOT_TOKEN: ${BOT_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/post_writer_bot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AUTO_INIT_DB: ${AUTO_INIT_DB:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-60}
      TELEGRAM_TIMEOUT_SECONDS: ${TELEGRAM_TIMEOUT_SECONDS:-30}
      ANALYZE_JOB_TIMEOUT_SECONDS: ${ANALYZE_JOB_TIMEOUT_SECONDS:-360}
      GENERATE_IDEAS_JOB_TIMEOUT_SECONDS: ${GENERATE_IDEAS_JOB_TIMEOUT_SECONDS:-240}
      GENERATE_POST_JOB_TIMEOUT_SECONDS: ${GENERATE_POST_JOB_TIMEOUT_SECONDS:-360}
      FOLLOWUP_FAST_MODE: ${FOLLOWUP_FAST_MODE:-true}
      MOCK_PAYMENTS: ${MOCK_PAYMENTS:-true}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  telegram-client-api:
    build: .
    restart: always
    command: uvicorn app.telegram_client_api.main:app --host 0.0.0.0 --port 8010
    environment:
      APP_ENV: ${APP_ENV:-local}
      TELEGRAM_CLIENT_API_ID: ${TELEGRAM_CLIENT_API_ID:-}
      TELEGRAM_CLIENT_API_HASH: ${TELEGRAM_CLIENT_API_HASH:-}
      TELEGRAM_CLIENT_DATA_DIR: ${TELEGRAM_CLIENT_DATA_DIR:-/app/telegram_client_data}
      TELEGRAM_CLIENT_SESSION_NAME: ${TELEGRAM_CLIENT_SESSION_NAME:-post_writer_client}
      TELEGRAM_CLIENT_ADMIN_TOKEN: ${TELEGRAM_CLIENT_ADMIN_TOKEN:-}
      TELEGRAM_CLIENT_TIMEOUT_SECONDS: ${TELEGRAM_CLIENT_TIMEOUT_SECONDS:-10}
    ports:
      - "8010:8010"
    volumes:
      - telegram_client_data:/app/telegram_client_data

  bot:
    build: .
    restart: always
    command: python -m app.bot.main
    environment:
      APP_ENV: ${APP_ENV:-local}
      BOT_TOKEN: ${BOT_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/post_writer_bot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AUTO_INIT_DB: ${AUTO_INIT_DB:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-60}
      TELEGRAM_TIMEOUT_SECONDS: ${TELEGRAM_TIMEOUT_SECONDS:-30}
      TELEGRAM_CLIENT_API_ID: ${TELEGRAM_CLIENT_API_ID:-}
      TELEGRAM_CLIENT_API_HASH: ${TELEGRAM_CLIENT_API_HASH:-}
      TELEGRAM_CLIENT_DATA_DIR: ${TELEGRAM_CLIENT_DATA_DIR:-/app/telegram_client_data}
      TELEGRAM_CLIENT_SESSION_NAME: ${TELEGRAM_CLIENT_SESSION_NAME:-post_writer_client}
      TELEGRAM_CLIENT_TIMEOUT_SECONDS: ${TELEGRAM_CLIENT_TIMEOUT_SECONDS:-10}
      ANALYZE_JOB_TIMEOUT_SECONDS: ${ANALYZE_JOB_TIMEOUT_SECONDS:-360}
      GENERATE_IDEAS_JOB_TIMEOUT_SECONDS: ${GENERATE_IDEAS_JOB_TIMEOUT_SECONDS:-240}
      GENERATE_POST_JOB_TIMEOUT_SECONDS: ${GENERATE_POST_JOB_TIMEOUT_SECONDS:-360}
      FOLLOWUP_FAST_MODE: ${FOLLOWUP_FAST_MODE:-true}
      MOCK_PAYMENTS: ${MOCK_PAYMENTS:-true}
    volumes:
      - telegram_client_data:/app/telegram_client_data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    restart: always
    command: python -m app.workers.worker
    environment:
      APP_ENV: ${APP_ENV:-local}
      BOT_TOKEN: ${BOT_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/post_writer_bot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AUTO_INIT_DB: ${AUTO_INIT_DB:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-60}
      TELEGRAM_TIMEOUT_SECONDS: ${TELEGRAM_TIMEOUT_SECONDS:-30}
      ANALYZE_JOB_TIMEOUT_SECONDS: ${ANALYZE_JOB_TIMEOUT_SECONDS:-360}
      GENERATE_IDEAS_JOB_TIMEOUT_SECONDS: ${GENERATE_IDEAS_JOB_TIMEOUT_SECONDS:-240}
      GENERATE_POST_JOB_TIMEOUT_SECONDS: ${GENERATE_POST_JOB_TIMEOUT_SECONDS:-360}
      FOLLOWUP_FAST_MODE: ${FOLLOWUP_FAST_MODE:-true}
      MOCK_PAYMENTS: ${MOCK_PAYMENTS:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build: .
    restart: always
    command: python -m app.workers.scheduler
    environment:
      APP_ENV: ${APP_ENV:-local}
      BOT_TOKEN: ${BOT_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/post_writer_bot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AUTO_INIT_DB: ${AUTO_INIT_DB:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-60}
      TELEGRAM_TIMEOUT_SECONDS: ${TELEGRAM_TIMEOUT_SECONDS:-30}
      ANALYZE_JOB_TIMEOUT_SECONDS: ${ANALYZE_JOB_TIMEOUT_SECONDS:-360}
      GENERATE_IDEAS_JOB_TIMEOUT_SECONDS: ${GENERATE_IDEAS_JOB_TIMEOUT_SECONDS:-240}
      GENERATE_POST_JOB_TIMEOUT_SECONDS: ${GENERATE_POST_JOB_TIMEOUT_SECONDS:-360}
      FOLLOWUP_FAST_MODE: ${FOLLOWUP_FAST_MODE:-true}
      MOCK_PAYMENTS: ${MOCK_PAYMENTS:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  telegram_client_data:
