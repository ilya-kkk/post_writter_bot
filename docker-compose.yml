services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: post_writer_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d post_writer_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    environment:
      APP_ENV: ${APP_ENV:-local}
      BOT_TOKEN: ${BOT_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/post_writer_bot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      FOLLOWUP_FAST_MODE: ${FOLLOWUP_FAST_MODE:-true}
      MOCK_PAYMENTS: ${MOCK_PAYMENTS:-true}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build: .
    command: python -m app.bot.main
    environment:
      APP_ENV: ${APP_ENV:-local}
      BOT_TOKEN: ${BOT_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/post_writer_bot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      FOLLOWUP_FAST_MODE: ${FOLLOWUP_FAST_MODE:-true}
      MOCK_PAYMENTS: ${MOCK_PAYMENTS:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: python -m app.workers.worker
    environment:
      APP_ENV: ${APP_ENV:-local}
      BOT_TOKEN: ${BOT_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/post_writer_bot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      FOLLOWUP_FAST_MODE: ${FOLLOWUP_FAST_MODE:-true}
      MOCK_PAYMENTS: ${MOCK_PAYMENTS:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build: .
    command: python -m app.workers.scheduler
    environment:
      APP_ENV: ${APP_ENV:-local}
      BOT_TOKEN: ${BOT_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/post_writer_bot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      FOLLOWUP_FAST_MODE: ${FOLLOWUP_FAST_MODE:-true}
      MOCK_PAYMENTS: ${MOCK_PAYMENTS:-true}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
