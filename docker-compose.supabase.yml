x-app-environment: &app-environment
  APP_ENV: ${APP_ENV:-production}
  BOT_TOKEN: ${BOT_TOKEN:-}
  DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your Supabase Postgres connection string}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  AUTO_INIT_DB: ${AUTO_INIT_DB:-false}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
  OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-60}
  TELEGRAM_TIMEOUT_SECONDS: ${TELEGRAM_TIMEOUT_SECONDS:-30}
  ANALYZE_JOB_TIMEOUT_SECONDS: ${ANALYZE_JOB_TIMEOUT_SECONDS:-360}
  GENERATE_IDEAS_JOB_TIMEOUT_SECONDS: ${GENERATE_IDEAS_JOB_TIMEOUT_SECONDS:-240}
  GENERATE_POST_JOB_TIMEOUT_SECONDS: ${GENERATE_POST_JOB_TIMEOUT_SECONDS:-360}
  FOLLOWUP_FAST_MODE: ${FOLLOWUP_FAST_MODE:-false}
  MOCK_PAYMENTS: ${MOCK_PAYMENTS:-false}

services:
  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    restart: always
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000
    environment: *app-environment
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy

  bot:
    build: .
    restart: always
    command: python -m app.bot.main
    environment: *app-environment
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    restart: always
    command: python -m app.workers.worker
    environment: *app-environment
    depends_on:
      redis:
        condition: service_healthy

  scheduler:
    build: .
    restart: always
    command: python -m app.workers.scheduler
    environment: *app-environment
    depends_on:
      redis:
        condition: service_healthy
